      summary: Create a study slot inside a stateful chart session.
      responses: { "200": { description: Study slot created. } }
  /v1/chart-session/study/modify:
    post:
      summary: Modify a study slot's inputs in place (debounced 500ms).
      responses: { "200": { description: Study modify result. } }
  /v1/chart-session/replay/step:
