  /v1/pubscripts/personal-access:
    post:
      summary: Fetch paid/private script access for the stored or provided session.
      responses: { "200": { description: Personal script access. } }
  /v1/pubscripts/packages-store:
    post:
      summary: Fetch Pine script package store.
      responses: { "200": { description: Script packages. } }
  /v1/study:
