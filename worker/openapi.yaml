      summary: Step a chart session's replay (forward/backward by N bars).
      responses: { "200": { description: Replay step result. } }
  /v1/chart-session/close:
    post:
      summary: Tear down a chart session and release the upstream WebSocket.
      responses: { "200": { description: Chart session closed. } }
