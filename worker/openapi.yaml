      responses: { "200": { description: Study chain result. } }
  /v1/study/modify:
    post:
      summary: Re-run a study with new inputs (short-lived modify, no DO).
      responses: { "200": { description: Study modify result. } }
  /v1/chart-session/create:
    post:
      summary: Create a stateful chart session (Durable Object) addressed by sessionToken.
      responses: { "200": { description: Chart session created. } }
  /v1/chart-session/study/create:
